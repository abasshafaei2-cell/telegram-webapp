<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Telegram Panel</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="container">

<div class="card green">
<span>🛒</span>
خرید محصول
</div>

<div class="row">

<div class="card blue">
<span>👤</span>
حساب کاربری
</div>

<div class="card blue">
<span>💰</span>
کیف پول
</div>

</div>

<div class="card red">
<span>⭐</span>
استارز
</div>

<div class="row">

<div class="card blue">
<span>👁</span>
ویو
</div>

<div class="card blue">
<span>🚀</span>
بوست
</div>

</div>

<div class="card red">
<span>🎁</span>
گیفت تلگرام
</div>

<div class="row">

<div class="card blue">
<span>📞</span>
پشتیبانی
</div>

<div class="card blue">
<span>⚙️</span>
تنظیمات
</div>

</div>

</div>

<script>

Telegram.WebApp.ready();
Telegram.WebApp.expand();

</script>

</body>
</html>
