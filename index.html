<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>پنل</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{

background:#070b18;

background-image:
linear-gradient(180deg,#071423,#05070f);

color:white;

padding:18px;

}

.header{

background:linear-gradient(135deg,#008cff,#0059ff);

padding:20px;

border-radius:18px;

box-shadow:0 0 25px rgba(0,140,255,.45);

margin-bottom:18px;

}

.name{

font-size:22px;

font-weight:bold;

}

.balance{

margin-top:10px;

font-size:15px;

opacity:.9;

}

.grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

}

.card{

background:#101828;

border-radius:18px;

padding:18px;

text-align:center;

transition:.25s;

border:1px solid rgba(255,255,255,.08);

box-shadow:0 0 12px rgba(0,0,0,.35);

}

.card:hover{

transform:scale(1.05);

background:#16253c;

}

.icon{

font-size:34px;

margin-bottom:10px;

}

.title{

font-size:15px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="header">

<div class="name">
👤 عباس
</div>

<div class="balance">
💰 موجودی کیف پول : ۰ تومان
</div>

</div>

<div class="grid"><div class="card">
<div class="icon">⭐</div>
<div class="title">استارز</div>
</div>

<div class="card">
<div class="icon">👁</div>
<div class="title">ویو</div>
</div>

<div class="card">
<div class="icon">🎁</div>
<div class="title">گیفت تلگرام</div>
</div>

<div class="card">
<div class="icon">🚀</div>
<div class="title">بوست</div>
</div>

<div class="card">
<div class="icon">💰</div>
<div class="title">کیف پول</div>
</div>

<div class="card">
<div class="icon">🛠</div>
<div class="title">پشتیبانی</div>
</div>

</div>

</body>
</html>
