<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>منوی رنگی</title>
<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#4f46e5,#06b6d4,#9333ea);background-size:300% 300%;animation:bg 10s ease infinite;display:flex;justify-content:center;align-items:center;min-height:100vh}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.card{background:rgba(255,255,255,.18);backdrop-filter:blur(16px);padding:24px;border-radius:24px;width:320px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
h2{text-align:center;color:#fff}
button{width:100%;padding:14px;margin:8px 0;border:none;border-radius:14px;font-size:17px;background:rgba(255,255,255,.25);color:#fff}
button:hover{transform:scale(1.03)}
</style>
</head>
<body>
<div class="card">
<h2>🎨 منوی رنگی ربات</h2>
<button>⭐ استارز</button>
<button>👁 ویو</button>
<button>🎁 گیفت تلگرام</button>
<button>🚀 بوست</button>
<button>💰 کیف پول</button>
<button>🛠 پشتیبانی</button>
</div>
</body>
</html>
